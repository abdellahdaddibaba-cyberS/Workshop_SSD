version: '3.8'

services:
  gateway:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - notification-service
      - inventory-service

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"

  product-service:
    build: ./services/product-service
    ports:
      - "8002:8002"

  order-service:
    build: ./services/order-service
    ports:
      - "8003:8003"

  payment-service:
    build: ./services/payment-service
    ports:
      - "8004:8004"

  notification-service:
    build: ./services/notification-service
    ports:
      - "8005:8005"

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "8006:8006"

  # --- SAST TOOLS ---
  sast-semgrep:
    image: returntocorp/semgrep
    volumes:
      - .:/src
    command: semgrep scan --config auto

  sast-bandit:
    image: pipelinecomponents/bandit
    volumes:
      - .:/src
    command: bandit -r /src

  # --- SCA TOOLS ---
  sca-trivy:
    image: aquasec/trivy:latest
    volumes:
      - .:/src
    command: fs /src

  sca-dependency-check:
    image: owasp/dependency-check:latest
    volumes:
      - .:/src
      - ./odc-data:/usr/share/dependency-check/data
    command: --project "SecureShop" --scan /src --format "HTML" --out /src/sca-report.html

