name: DAST (Dynamic Application Security Testing)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: DAST Security Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Services
        run: |
          docker-compose up -d

      - name: Wait for Services
        run: sleep 60

      - name: Run OWASP ZAP
        run: |
          # Running ZAP as a simple container command
          docker run --rm -v $(pwd):/zap/wrk/:rw ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://$(hostname -I | awk '{print $1}'):80 -r report.html || true

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: report.html

      - name: Stop Services
        run: docker-compose down
