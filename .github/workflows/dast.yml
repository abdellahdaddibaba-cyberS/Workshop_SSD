name: DAST (Dynamic Application Security Testing)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: OWASP ZAP Baseline Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Services
        run: |
          # Use dummy env vars so the services can start for the scan
          export JWT_SECRET=test_key
          export DB_PASSWORD=test_pass
          export RABBITMQ_PASS=test_pass
          export SMTP_PASSWORD=test_pass
          docker-compose up -d

      - name: Wait for Services
        run: sleep 40 # Increased wait time to ensure Nginx is ready

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0 # Upgraded version
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://localhost/' # Scanning the API Gateway root
          rules_file_name: '.zap/rules.tsv' # Optional rules
          allow_issue_writing: true
          fail_action: false # Report but don't fail the build

      - name: Stop Services
        run: docker-compose down
