name: DAST (Dynamic Application Security Testing)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: OWASP ZAP Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Services
        run: |
          export JWT_SECRET=test_key
          export DB_PASSWORD=test_pass
          export RABBITMQ_PASS=test_pass
          export SMTP_PASSWORD=test_pass
          docker-compose up -d

      - name: Wait for Services
        run: sleep 60 # Give it plenty of time

      - name: Run ZAP Baseline Scan (Manual Docker)
        run: |
          docker run --network="host" --rm -v $(pwd):/zap/wrk/:rw \
          ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
          -t http://localhost:80 \
          -g gen.conf -r report.html || true

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: report.html

      - name: Stop Services
        run: docker-compose down
